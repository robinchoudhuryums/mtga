<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MTG Arena — Decks</title>
<style>
  :root { --bg:#0f1115; --panel:#191c23; --panel2:#21252e; --line:#2c313c;
    --text:#e7e9ee; --muted:#949bab; --accent:#d9a441; --ok:#9dc7a3; --warn:#e3c98a; --bad:#e39a8a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { position:sticky; top:0; z-index:5; background:rgba(15,17,21,.96);
    backdrop-filter:blur(6px); border-bottom:1px solid var(--line); padding:14px 20px;
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  h1 { font-size:19px; margin:0; }
  .stats { color:var(--muted); font-size:13px; }
  a.tool { margin-left:auto; text-decoration:none; background:var(--panel2); color:var(--text);
    border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:13px; }
  a.tool:hover { border-color:var(--accent); color:var(--accent); }
  .wrap { padding:20px; max-width:920px; margin:0 auto; }
  .deck { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--text);
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px 16px; margin-bottom:10px; }
  .deck:hover { border-color:var(--accent); }
  .deck.variant { margin-left:26px; }
  .id { font-family:ui-monospace, monospace; color:var(--muted); min-width:44px; }
  .nm { font-weight:700; flex:1; }
  .cnt { color:var(--muted); font-size:13px; min-width:120px; text-align:right; }
  .badge { font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px; min-width:96px;
    text-align:center; }
  .badge.ok { color:var(--ok); border:1px solid var(--ok); }
  .badge.warn { color:var(--warn); border:1px solid var(--warn); }
</style>
</head>
<body>
<header>
  <h1>Decks</h1>
  <span class="stats" id="stats"></span>
  <a class="tool" href="/">← Collection</a>
</header>
<div class="wrap" id="list"></div>
<script id="data" type="application/json">__DATA__</script>
<script>
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const decks = DATA.decks;
  const list = document.getElementById('list');
  list.innerHTML = decks.map(d => {
    const ready = d.short === 0 && d.missing === 0;
    const badge = ready ? '<span class="badge ok">buildable ✓</span>'
      : `<span class="badge warn">${[d.missing?d.missing+' missing':'', d.short?d.short+' short':'']
          .filter(Boolean).join(', ')}</span>`;
    return `<a class="deck${d.variant?' variant':''}" href="/deck/${encodeURIComponent(d.id)}">
      <span class="id">[${esc(d.id)}]</span>
      <span class="nm">${esc(d.name)}</span>
      <span class="cnt">${d.unique} unique · ${d.total} cards</span>
      ${badge}</a>`;
  }).join('');
  const buildable = decks.filter(d => d.short===0 && d.missing===0).length;
  document.getElementById('stats').textContent =
    `${decks.length} decks · ${buildable} buildable now`;
  function esc(s){ return (s||'').toString().replace(/[&<>"]/g,m=>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
</script>
</body>
</html>
