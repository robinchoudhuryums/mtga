<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MTG Arena — Deck Editor</title>
<style>
  :root { --bg:#0f1115; --panel:#191c23; --panel2:#21252e; --line:#2c313c;
    --text:#e7e9ee; --muted:#949bab; --accent:#d9a441; --dirty:#4f9d69;
    --ok:#9dc7a3; --short:#e3c98a; --missing:#e39a8a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { position:sticky; top:0; z-index:5; background:rgba(15,17,21,.96);
    backdrop-filter:blur(6px); border-bottom:1px solid var(--line); padding:14px 20px; }
  .titlebar { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  h1 { font-size:19px; margin:0; }
  .file { color:var(--muted); font-size:12px; font-family:ui-monospace, monospace; }
  .summary { color:var(--muted); font-size:13px; margin-top:8px; display:flex; gap:14px; flex-wrap:wrap; }
  .summary b.ok { color:var(--ok); } .summary b.short { color:var(--short); }
  .summary b.missing { color:var(--missing); }
  a.tool, button.tool { text-decoration:none; background:var(--panel2); color:var(--text);
    border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:13px; cursor:pointer; }
  button.tool:hover, a.tool:hover { border-color:var(--accent); }
  #save { margin-left:auto; }
  #save.ready { background:var(--dirty); color:#0c130e; border-color:var(--dirty); font-weight:700; }
  .wrap { padding:16px 20px 60px; max-width:860px; margin:0 auto; }
  h2 { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted);
    margin:20px 0 8px; font-weight:700; }
  .meta .mrow { display:flex; gap:8px; align-items:center; padding:2px 0; }
  .mkey { width:100px; background:var(--panel2); color:var(--muted); border:1px solid var(--line);
    border-radius:6px; padding:6px 8px; font-size:12px; }
  .mval { flex:1; background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:6px 9px; font-size:14px; }
  .row { display:flex; align-items:center; gap:8px; padding:3px 0; }
  .row.other { color:var(--muted); font-family:ui-monospace, monospace; font-size:12px;
    white-space:pre; min-height:12px; padding:2px 0; }
  .row.comment { color:var(--accent); opacity:.8; }
  .qty { width:52px; background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:6px 7px; font-size:14px; font-weight:700; text-align:center; }
  .name { flex:1; min-width:140px; background:var(--panel2); color:var(--text);
    border:1px solid var(--line); border-radius:6px; padding:6px 9px; font-size:14px; }
  .set, .cn { width:64px; background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:6px 7px; font-size:13px; }
  .cn { width:56px; }
  input:focus { outline:none; border-color:var(--accent); }
  .stat { min-width:96px; font-size:12px; font-weight:700; text-align:right; }
  .stat.ok { color:var(--ok); } .stat.short { color:var(--short); } .stat.missing { color:var(--missing); }
  .rm { width:24px; height:24px; border-radius:6px; border:1px solid var(--line);
    background:transparent; color:var(--muted); cursor:pointer; font-size:12px; padding:0; }
  .rm:hover { color:var(--missing); border-color:var(--missing); }
  .add { margin-top:12px; }
  .tabs { display:flex; gap:6px; margin:8px 0; flex-wrap:wrap; }
  .tab { background:var(--panel2); border:1px solid var(--line); border-radius:8px 8px 0 0;
    padding:7px 12px; font-size:13px; cursor:pointer; color:var(--muted); }
  .tab.on { color:var(--text); border-color:var(--accent); }
  pre.out { background:var(--panel); border:1px solid var(--line); border-radius:0 8px 8px 8px;
    padding:14px; overflow-x:auto; font-size:12.5px; line-height:1.5; margin:0; min-height:40px;
    white-space:pre-wrap; }
  .note { color:var(--short); font-size:12px; margin:6px 0; }
  .flexrow { display:flex; gap:8px; align-items:baseline; padding:8px 10px; border:1px solid var(--line);
    border-radius:8px; margin:6px 0; background:var(--panel2); flex-wrap:wrap; }
  .flexrow .swap { font-size:13.5px; }
  .flexrow .out { color:var(--short); }
  .flexrow .in { color:var(--accent); font-weight:600; }
  .flexrow .meta { color:var(--muted); font-size:12px; }
  .flexrow .fnote { flex-basis:100%; color:var(--muted); font-size:12px; margin-top:2px; }
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--panel2);
    border:1px solid var(--line); border-radius:8px; padding:10px 16px; font-size:13px; opacity:0;
    transition:opacity .2s; pointer-events:none; max-width:80vw; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <div class="titlebar">
    <a class="tool" href="/decks">← Decks</a>
    <h1 id="title"></h1>
    <span class="file" id="file"></span>
    <button id="save" class="tool">No changes</button>
  </div>
  <div class="summary" id="summary"></div>
</header>
<div class="wrap">
  <h2>Metadata</h2>
  <div class="meta" id="meta"></div>
  <button class="tool add" id="addMeta" style="margin-top:8px">＋ Add field</button>

  <h2>Cards</h2>
  <div id="rows"></div>
  <button class="tool add" id="addRow">＋ Add card line</button>

  <div id="flex"></div>
  <div id="analysis"></div>
</div>
<div class="toast" id="toast"></div>
<script id="data" type="application/json">__DATA__</script>
<script>
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const NEW = !!DATA.new;
  const META = DATA.meta;                 // [{key,value}]
  const BODY = DATA.body;                 // ordered tokens (card | other)
  const OWNED = DATA.owned;               // name_lower -> total owned
  const BASICS = new Set(DATA.basics);
  const baseline = () => JSON.stringify({m: META, b: BODY});
  let ORIG = baseline();

  const rowsEl = document.getElementById('rows');
  const metaEl = document.getElementById('meta');
  const saveBtn = document.getElementById('save');
  document.getElementById('title').textContent = NEW ? 'New deck' : `Deck ${DATA.id}: ${DATA.name}`;
  document.getElementById('file').textContent = DATA.file;

  function cardStatus(t) {
    const name = (t.name || '').trim().toLowerCase();
    const need = parseInt(t.qty) || 0;
    if (!name) return {cls:'', txt:''};
    if (BASICS.has(name)) return {cls:'ok', txt:'basic ∞'};
    if (!(name in OWNED)) return {cls:'missing', txt:'not owned'};
    const have = OWNED[name];
    return have < need ? {cls:'short', txt:`have ${have} / ${need}`}
                       : {cls:'ok', txt:`have ${have} / ${need}`};
  }

  function refresh() {
    let unique=0, total=0, short=0, missing=0;
    for (const t of BODY) if (t.kind==='card' && (t.name||'').trim()) {
      unique++; total += parseInt(t.qty)||0;
      const st = cardStatus(t);
      if (st.cls==='short') short++; else if (st.cls==='missing') missing++;
    }
    const ready = short===0 && missing===0;
    document.getElementById('summary').innerHTML =
      `<span>${unique} unique · ${total} cards</span>` +
      (unique===0 ? '' : ready ? `<span><b class="ok">buildable ✓</b></span>`
        : `<span>${missing?`<b class="missing">${missing} missing</b> `:''}${short?`<b class="short">${short} short</b>`:''}</span>`);
    const dirty = baseline() !== ORIG;
    saveBtn.textContent = NEW ? 'Create deck' : (dirty ? 'Save deck' : 'No changes');
    saveBtn.classList.toggle('ready', dirty || NEW);
    renderAnalysisNote(dirty);
  }

  function renderMeta() {
    metaEl.innerHTML = '';
    META.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'mrow';
      row.innerHTML = `<input class="mkey" value="${esc(p.key)}" placeholder="field">` +
        `<input class="mval" value="${esc(p.value)}" placeholder="value">` +
        `<button class="rm" title="Remove field">✕</button>`;
      const k = row.querySelector('.mkey'), v = row.querySelector('.mval');
      k.addEventListener('input', () => { p.key = k.value; refresh(); });
      v.addEventListener('input', () => { p.value = v.value; refresh(); });
      row.querySelector('.rm').addEventListener('click', () => { META.splice(i,1); renderMeta(); refresh(); });
      metaEl.appendChild(row);
    });
  }

  function renderRows() {
    rowsEl.innerHTML = '';
    BODY.forEach((t, i) => {
      const row = document.createElement('div');
      if (t.kind !== 'card') {
        const raw = t.raw || '';
        row.className = 'row other' + (raw.trim().startsWith('#') && !raw.trim().startsWith('#:') ? ' comment' : '');
        row.textContent = raw || ' ';
        rowsEl.appendChild(row); return;
      }
      row.className = 'row card';
      row.innerHTML =
        `<input class="qty" type="number" min="1" value="${esc(t.qty)}">` +
        `<input class="name" value="${esc(t.name)}" placeholder="Card name">` +
        `<input class="set" value="${esc(t.set)}" placeholder="Set">` +
        `<input class="cn" value="${esc(t.cn)}" placeholder="#">` +
        `<span class="stat"></span><button class="rm" title="Remove line">✕</button>`;
      rowsEl.appendChild(row);
      const q=row.querySelector('.qty'), nm=row.querySelector('.name');
      const st=row.querySelector('.set'), cn=row.querySelector('.cn'), stat=row.querySelector('.stat');
      const paint = () => {
        t.qty=q.value; t.name=nm.value; t.set=st.value; t.cn=cn.value;
        const s=cardStatus(t); stat.textContent=s.txt; stat.className='stat '+s.cls; refresh();
      };
      [q,nm,st,cn].forEach(el => el.addEventListener('input', paint));
      row.querySelector('.rm').addEventListener('click', () => { BODY.splice(i,1); renderRows(); refresh(); });
      const s=cardStatus(t); stat.textContent=s.txt; stat.className='stat '+s.cls;
    });
  }

  document.getElementById('addMeta').addEventListener('click', () => { META.push({key:'', value:''}); renderMeta(); refresh(); });
  document.getElementById('addRow').addEventListener('click', () => {
    BODY.push({kind:'card', qty:'1', name:'', set:'', cn:''}); renderRows(); refresh();
    const last = rowsEl.querySelector('.row.card:last-of-type .name'); if (last) last.focus();
  });

  saveBtn.addEventListener('click', async () => {
    if (!NEW && baseline() === ORIG) return;
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      const url = NEW ? '/api/deck/new' : '/api/deck/save';
      const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id: DATA.id, meta: META, body: BODY})});
      const d = await res.json();
      if (d.ok) {
        if (NEW) { location.href = '/deck/' + encodeURIComponent(d.id); }
        else { toast(`Saved ${d.cards} card lines` + (d.backup?` · backup ${d.backup}`:'')); location.reload(); }
      } else { toast('Save failed: ' + (d.errors||['unknown']).join('  |  ')); }
    } catch (err) { toast('Save failed (is the server running?): ' + err.message); }
    finally { saveBtn.disabled = false; refresh(); }
  });

  // --- Analysis tabs (stats / mana / tribes / suggest), read-only, saved deck ---
  const KINDS = [['stats','Stats'],['mana','Mana'],['tribes','Tribes'],['suggest','Suggestions']];
  const cache = {}; let curKind = null;
  function buildAnalysis() {
    if (NEW) return;  // no saved file yet
    const el = document.getElementById('analysis');
    el.innerHTML = `<h2>Analysis</h2><div class="tabs" id="tabs"></div>` +
      `<div class="note" id="anote" style="display:none"></div><pre class="out" id="out">Pick a tab.</pre>`;
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = KINDS.map(([k,l]) => `<span class="tab" data-k="${k}">${l}</span>`).join('');
    tabs.addEventListener('click', e => { const t=e.target.closest('.tab'); if(t) showKind(t.dataset.k); });
  }
  async function showKind(kind) {
    curKind = kind;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.k===kind));
    const out = document.getElementById('out');
    if (cache[kind] !== undefined) { out.textContent = cache[kind]; return; }
    out.textContent = 'Running…';
    try {
      const res = await fetch(`/api/deck/analysis/${encodeURIComponent(DATA.id)}/${kind}`);
      const d = await res.json();
      cache[kind] = d.ok ? d.text : ('error: ' + (d.error||'unknown'));
    } catch (err) { cache[kind] = 'error: ' + err.message; }
    if (curKind === kind) out.textContent = cache[kind];
  }
  function renderAnalysisNote(dirty) {
    const n = document.getElementById('anote'); if (!n) return;
    n.style.display = dirty ? 'block' : 'none';
    if (dirty) n.textContent = 'Unsaved changes — analysis reflects the last saved version. Save to refresh.';
  }

  let toastT;
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),4000); }
  function esc(s){ return (s==null?'':s).toString().replace(/[&<>"]/g,m=>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

  // --- Flex / suggested swaps (read-only, from #~ lines in the deck file) ---
  function renderFlex() {
    const el = document.getElementById('flex');
    const flex = DATA.flex || [];
    if (NEW || !flex.length) { el.innerHTML = ''; return; }
    const rows = flex.map(f => {
      const inName = (f.in || '').trim();
      let owned = '';
      if (inName) {
        const key = inName.toLowerCase();
        owned = BASICS.has(key) ? '<span class="meta">basic ∞</span>'
          : (key in OWNED ? `<span class="meta">owned ×${OWNED[key]}</span>`
                          : '<span class="meta">not owned</span>');
      }
      const swap = (f.out || f.in)
        ? `<span class="swap"><span class="out">− ${esc(f.out)}</span>`
          + (f.in ? ` &nbsp;→&nbsp; <span class="in">+ ${esc(f.in)}</span> ${owned}` : '')
          + `</span>` : '';
      const note = f.note ? `<span class="fnote">${esc(f.note)}</span>` : '';
      return `<div class="flexrow">${swap}${note}</div>`;
    }).join('');
    el.innerHTML = `<h2>Suggested swaps</h2>`
      + `<div class="note">Flex ideas recorded in the deck file (comments — not part of the 60). `
      + `Edit them there or via <code>deck.py flex ${esc(DATA.id)}</code>.</div>${rows}`;
  }

  renderMeta(); renderRows(); renderFlex(); buildAnalysis(); refresh();
</script>
</body>
</html>
